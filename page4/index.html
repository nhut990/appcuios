<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài Đặt Ứng Dụng iOS Phiên Bản Cũ - Trang 4</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(ellipse at top left, #232526 0%, #434343 70%, #000 100%);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .title-row img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px #fff8);
      background: #fff;
      border-radius: 14px;
      padding: 4px;
      box-shadow: 0 2px 16px #0007;
    }
    h1 {
      margin: 0;
      color: #ff5555;
      font-size: 2.1rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 6px #000c;
    }
    .app-list { display: flex; flex-direction: column; gap: 15px; }
    .app { background: rgba(255,255,255,0.10); border-radius: 10px; padding: 12px 14px; margin: 0; box-shadow: 0 0 8px 2px rgba(0,0,0,0.25); max-width: 600px; margin-left: auto; margin-right: auto; width: 100%; transition: box-shadow 0.15s; }
    .app-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .app-header h2 { font-size: 1.15rem; margin: 0; font-weight: 600; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
    .app-header span { font-size: 1.2rem; margin-left: 10px; transition: transform 0.2s; }
    .app-header:hover { color: #64b5f6; }
    .app-icon { width: 32px; height: 32px; object-fit: contain; border-radius: 8px; box-shadow: 0 2px 12px #0005; background: #fff; margin-right: 2px; }
    .versions { display: none; margin-top: 8px; }
    .version { background: rgba(255,255,255,0.15); border-radius: 7px; padding: 7px 9px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;}
    .version .ver-icon { width: 24px; height: 24px; object-fit: contain; border-radius: 6px; background: #fff; margin-right: 8px; vertical-align: middle; box-shadow: 0 2px 8px #0003; }
    .version-details { display: flex; flex-direction: column; }
    .version-ios { color: #90caf9; font-size: 0.97em; font-weight: 500; margin-top: 2px; margin-left: 32px;}
    .btn { background: #64b5f6; color: #000; border: none; border-radius: 7px; padding: 4px 10px; cursor: pointer; font-weight: bold; font-size: 0.97em; transition: background 0.15s; }
    .btn:active { background: #43a047; color: #fff; }
    .btn:hover { background: #90caf9; }
    .footer { text-align: center; margin-top: 40px; font-size: 1.16em; color: #fff; letter-spacing: 1px; opacity: 0.8; user-select: none; }
    .blinker { display: inline-block; animation: blink 1.2s infinite alternate; font-weight: bold; }
    .blinker2 { display: inline-block; animation: blink2 1.2s infinite alternate; font-weight: bold; }
    @keyframes blink { from { color: #ff5555; text-shadow: 0 0 10px #ff555599; } to { color: #64b5f6; text-shadow: 0 0 10px #64b5f699; } }
    @keyframes blink2 { from { color: #64b5f6; text-shadow: 0 0 10px #64b5f699; } to { color: #ff5555; text-shadow: 0 0 10px #ff555599; } }
    .note-app-id { text-align: center; color: #bbb; font-size: 1.04em; margin: 24px 0 0 0; font-style: italic; letter-spacing: 0.5px; user-select: none; }
    @media (max-width: 700px) { .container { max-width: 98vw; } .app { max-width: 98vw; } .footer { font-size: 1em; } .back-home { font-size: 0.98em; } .page2-link { font-size: 0.98em; } }
    .paging-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 18px;
      margin-top: 18px;
    }
    .paging-link {
      padding: 8px 18px;
      background: #fff2;
      color: #64b5f6;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.08em;
      box-shadow: 0 2px 8px #0006;
      transition: background 0.18s, color 0.18s;
      position: relative;
      z-index: 1;
    }
    .paging-link:hover {
      background: #64b5f6;
      color: #fff;
    }
    .paging-current {
      padding: 13px 22px;
      background: #ff5555;
      color: #fff;
      border-radius: 18px;
      font-size: 1.3em;
      font-weight: bold;
      box-shadow: 0 4px 24px #ff555599, 0 2px 8px #0009;
      position: relative;
      top: -14px;
      z-index: 2;
      user-select: none;
      pointer-events: none;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-row">
      <img src="https://github.com/nhut990/files/releases/download/V2.0-icon/100px-Apple_logo.png" alt="Apple Logo" />
      <h1>Cài Đặt Ứng Dụng iOS Phiên Bản Cũ</h1>
    </div>
    <div id="apps" class="app-list"></div>
    <div class="note-app-id">
      <em>Lưu ý: Các ứng dụng bên trên chỉ sử dụng được khi bạn có ID Apple của người tạo ra app</em>
    </div>
  </div>
  <div class="footer">
    <div class="paging-row">
      <a class="paging-link" href="https://nhut990.github.io/appcuios/page3/">Trước (3)</a>
      <span class="paging-current">4</span>
      <a class="paging-link" href="https://nhut990.github.io/appcuios/page5/">Sau (5)</a>
    </div>
    <br>
    Created by <span class="blinker">Minh</span> <span class="blinker2">Nhut</span><br>
    &copy; 2025
  </div>
  <script>
    var apps = [
      {
        name: "31. Shopee",
        icon: "https://github.com/Nhut11790/ipanhut117117/releases/download/v1.0_ICON/shopee.jpg",
        versions: [
          { version: "3.11.9", ios: "iOS 11.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Shopee.3.11.9.plist" },
          { version: "3.23.40", ios: "iOS 11.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Shopee.3.23.40.plist" },
          { version: "3.38.49", ios: "iOS 11.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Shopee.3.38.49.plist" }
        ]
      },
      {
        name: "32. Musi",
        icon: "https://github.com/Nhut11790/ipanhut117117/releases/download/v1.0_ICON/Musi.jpg",
        versions: [
          { version: "6.2.26", ios: "iOS 13.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Musi_6.2.26.plist" },
          { version: "6.2.33", ios: "iOS 13.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Musi_6.2.33.plist" },
          { version: "6.2.41", ios: "iOS 14.0 or later", link: "itms-services://?action=download-manifest&url=https://github.com/Nhut11790/ipanhut117117/releases/download/V1.Test-plist/Musi_6.2.41.plist" }
        ]
      }
    ];

    var appsContainer = document.getElementById("apps");
    for (var i = 0; i < apps.length; i++) {
      var app = apps[i];
      var appDiv = document.createElement("div");
      appDiv.className = "app";
      var versionsHtml = "";
      for (var j = 0; j < app.versions.length; j++) {
        var v = app.versions[j];
        var iconToShow = v.subIcon || app.icon;
        versionsHtml += '<div class="version">' +
            '<div class="version-details">' +
              '<span><img src="' + iconToShow + '" alt="icon" class="ver-icon"> Phiên bản <b>' + v.version + '</b></span>' +
              (v.ios ? '<span class="version-ios">' + v.ios + '</span>' : '') +
            '</div>' +
            '<button class="btn" onclick="install(\'' + v.link + '\')">Cài đặt</button>' +
          '</div>';
      }
      appDiv.innerHTML =
        '<div class="app-header" onclick="toggleVersions(' + i + ')">' +
          '<h2>' +
            '<span>' + app.name.split(' ')[0] + '</span>' +
            '<img src="' + app.icon + '" alt="icon" class="app-icon">' +
            app.name.substring(app.name.indexOf(' ')+1) +
          '</h2>' +
          '<span id="arrow-' + i + '">⬇️</span>' +
        '</div>' +
        '<div class="versions" id="versions-' + i + '">' +
          versionsHtml +
        '</div>';
      appsContainer.appendChild(appDiv);
    }
    window.toggleVersions = function(index) {
      var div = document.getElementById("versions-" + index);
      var arrow = document.getElementById("arrow-" + index);
      // Sửa cho iOS thấp: kiểm tra trạng thái display
      if (div.style.display === "" || div.style.display === "none") {
        div.style.display = "block";
        if(arrow) arrow.style.transform = "rotate(180deg)";
      } else {
        div.style.display = "none";
        if(arrow) arrow.style.transform = "";
      }
    }
    window.install = function(link) {
      window.location.href = link;
    }
  </script>
</body>
</html>
